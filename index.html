<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    :root {
      --g-columns:    4;
      --g-col-width:  320px;
      --g-col-gap:    20px;
      --g-board-max:  1800px;
      --g-font-size:  14px;
      --g-pad-v:      18px;
      --g-pad-h:      20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e12;
      color: #d4d4d8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: var(--g-font-size);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 28px;
    }

    #board {
      column-width: var(--g-col-width);
      column-count: var(--g-columns);
      column-gap:   var(--g-col-gap);
      width: 100%;
      max-width: var(--g-board-max);
    }

    .panel {
      background: #16161d;
      border: 1px solid #24242e;
      border-radius: 12px;
      padding: var(--g-pad-v) var(--g-pad-h);
      display: flex;
      flex-direction: column;
      gap: 11px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      transition: box-shadow 0.2s;
      break-inside: avoid;
      margin-bottom: 20px;
    }

    .panel:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.55);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e1e28;
      margin-bottom: 2px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 13px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    /* Per-panel accent colours assigned in JS */
    .panel[data-id="programming"] { --accent: #7aa2f7; }
    .panel[data-id="house"]        { --accent: #9ece6a; }
    .panel[data-id="rotation"]     { --accent: #e0af68; }
    .panel[data-id="brain"]        { --accent: #bb9af7; }
    .panel[data-id="quotes"]       { --accent: #f7768e; }

    /* ── Checklist panels ── */
    .checklist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 5px 7px;
      border-radius: 6px;
      line-height: 1.45;
      transition: background 0.15s;
      width: 100%;
      box-sizing: border-box;
    }

    .checklist li:hover {
      background: #1e1e28;
    }

    .checklist li input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
      width: 13px;
      height: 13px;
    }

    .checklist li span:not(.item-grip) {
      cursor: pointer;
      flex: 1;
      color: #c9c9d4;
    }

    .checklist li.done span {
      text-decoration: line-through;
      color: #44444e;
    }

    .checklist li .del-btn {
      background: none;
      border: none;
      color: #333340;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      visibility: hidden;
      transition: color 0.15s;
    }

    .checklist li:hover .del-btn { visibility: visible; }
    .checklist li .del-btn:hover { color: #c06070; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .add-row input[type="text"] {
      flex: 1;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #c9c9d4;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-row input[type="text"]:focus {
      border-color: var(--accent);
    }

    .add-row input[type="text"]::placeholder { color: #44444e; }

    .add-row button, .clear-btn {
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #888896;
      cursor: pointer;
      font-size: 12px;
      padding: 6px 10px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .add-row button:hover {
      background: #2a2a38;
      color: var(--accent);
      border-color: var(--accent);
    }

    .clear-btn {
      align-self: flex-start;
      font-size: 11px;
      color: #38383e;
      border-color: transparent;
      background: transparent;
    }

    .clear-btn:hover {
      background: #1e1e28;
      color: #c06070;
      border-color: transparent;
    }

    /* ── Static panels ── */
    .static-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .static-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 5px 7px;
      border-radius: 6px;
      line-height: 1.45;
      color: #b0b0bc;
      transition: background 0.15s, color 0.15s;
    }

    .static-list li:hover {
      background: #1e1e28;
      color: #d4d4d8;
    }

    .static-list li::before { display: none; }

    .static-text::before {
      content: '›';
      color: var(--accent);
      opacity: 0.5;
      font-size: 15px;
      margin-right: 6px;
    }

    .static-list.has-tags li {
      justify-content: space-between;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      margin-left: 8px;
      align-self: center;
    }

    .tag-daily   { background: #1a2e1a; color: #9ece6a; }
    .tag-weekly  { background: #1a2030; color: #7aa2f7; }
    .tag-anytime { background: #2a2218; color: #e0af68; }
    .tag-body    { background: #2a1a2e; color: #bb9af7; }
    .tag-mind    { background: #1a2a2e; color: #7dcfff; }
    .tag-breath  { background: #1a2a1f; color: #73daca; }

    /* ── Panel content wrapper (transparent to flex layout) ── */
    .panel-content { display: contents; }

    /* ── Panel title layout ── */
    .panel-label { flex: 1; }

    /* ── Settings bar ── */
    .cfg-btn { font-size: 12px; }
    .cfg-btn.active { color: var(--accent); border-color: var(--accent); }

    .settings-bar {
      flex-direction: column;
      gap: 8px;
      padding: 10px 12px;
      background: #12121a;
      border-radius: 8px;
      border: 1px solid #1e1e2a;
    }

    .settings-modes {
      display: flex;
      gap: 4px;
    }

    .mode-btn {
      flex: 1;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #555566;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 4px;
      transition: all 0.15s;
    }

    .mode-btn:hover { color: #888896; border-color: #3a3a4a; }

    .mode-btn.active {
      background: #22223a;
      border-color: var(--accent);
      color: var(--accent);
    }

    .settings-limit {
      align-items: center;
      gap: 6px;
    }

    .stepper-btn {
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 5px;
      color: #888896;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 2px 8px;
      transition: all 0.15s;
    }

    .stepper-btn:hover { color: var(--accent); border-color: var(--accent); }

    .stepper-val {
      width: 38px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #c9c9d4;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 5px;
      padding: 2px 4px;
      outline: none;
      transition: border-color 0.15s;
    }
    .stepper-val:focus { border-color: var(--accent); }

    .stepper-lbl {
      font-size: 11px;
      color: #444455;
    }

    /* Scrollable list */
    .checklist, .static-list {
      scrollbar-width: thin;
      scrollbar-color: #2a2a38 transparent;
    }

    /* ── Add panel card ── */
    .add-panel-card {
      border: 2px dashed #2a2a38;
      background: transparent;
      box-shadow: none;
      cursor: pointer;
      transition: border-color 0.2s;
      min-height: 72px;
      justify-content: center;
      align-items: center;
    }

    .add-panel-card:hover { border-color: #4a4a5a; }

    .add-panel-idle {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #3a3a4a;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }

    .add-panel-card:hover .add-panel-idle { color: #666680; }

    .add-panel-plus {
      font-size: 22px;
      line-height: 1;
      font-weight: 300;
    }

    .add-panel-open { cursor: default; }

    .add-panel-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .add-panel-input {
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #c9c9d4;
      font-size: 14px;
      outline: none;
      padding: 7px 10px;
      transition: border-color 0.15s;
    }

    .add-panel-input:focus { border-color: #5a5a7a; }

    .add-panel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: #666680;
    }

    .add-panel-btns { justify-content: flex-end; margin-top: 4px; }

    .panel-del-btn { margin-left: 4px; }

    /* ── Item drag handles ── */
    .item-grip {
      color: #2e2e3e;
      cursor: grab;
      flex-shrink: 0;
      font-size: 13px;
      line-height: 1;
      padding: 0 4px 0 0;
      user-select: none;
      transition: color 0.15s;
    }

    li:hover .item-grip,
    .edit-row:hover .item-grip { color: var(--accent); opacity: 0.6; }

    .item-ghost {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      opacity: 0.75;
      background: #1e1e28;
      border-radius: 6px;
      padding: 5px 7px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-dragging { opacity: 0; }

    .item-drop-before { box-shadow: inset 0 2px 0 var(--accent); }
    .item-drop-after  { box-shadow: inset 0 -2px 0 var(--accent); }

    /* ── Static panel edit mode ── */
    .edit-toggle-btn {
      background: none;
      border: 1px solid #2a2a38;
      border-radius: 5px;
      color: #555566;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      text-transform: uppercase;
      flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s;
    }

    .edit-toggle-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .edit-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .edit-row {
      background: #1a1a24;
      border: 1px solid #22222e;
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.15s;
    }

    .edit-row:hover { border-color: #2e2e3e; }

    .edit-row-top {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .edit-row-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 22px;
    }

    .edit-text-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid #2a2a38;
      border-radius: 0;
      color: #c9c9d4;
      padding: 2px 0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .edit-text-input:focus { border-bottom-color: var(--accent); }

    .tag-cycle-btn {
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      transition: opacity 0.15s;
    }

    .tag-cycle-btn:hover { opacity: 0.8; }
    .tag-cycle-btn.tag-daily   { background: #1a2e1a; color: #9ece6a; }
    .tag-cycle-btn.tag-weekly  { background: #1a2030; color: #7aa2f7; }
    .tag-cycle-btn.tag-anytime { background: #2a2218; color: #e0af68; }
    .tag-cycle-btn.tag-body    { background: #2a1a2e; color: #bb9af7; }
    .tag-cycle-btn.tag-mind    { background: #1a2a2e; color: #7dcfff; }
    .tag-cycle-btn.tag-breath  { background: #1a2a1f; color: #73daca; }
    .tag-cycle-btn.tag-none    { background: #22222e; color: #555566; }

    .static-del {
      background: none;
      border: none;
      color: #2e2e3e;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 16px;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }

    .static-del:hover { color: #c06070; }

    /* ── Drag and drop ── */
    .panel-title {
      cursor: grab;
    }

    .panel-title:active {
      cursor: grabbing;
    }

    .grip {
      color: #2e2e3e;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
      user-select: none;
    }

    .panel-title:hover .grip { color: var(--accent); opacity: 0.5; }

    .panel.dragging {
      opacity: 0;
    }

    .panel-ghost {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.85;
      transform: scale(1.03) rotate(0.5deg);
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
    }

    .panel.drop-before {
      box-shadow: 0 -3px 0 0 var(--accent), 0 2px 12px rgba(0,0,0,0.4);
    }

    .panel.drop-after {
      box-shadow: 0 3px 0 0 var(--accent), 0 2px 12px rgba(0,0,0,0.4);
    }
    /* ── Global settings button ── */
    #global-settings-btn {
      position: fixed;
      bottom: 20px;
      right: 24px;
      z-index: 900;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      color: #444455;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 8px 11px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    #global-settings-btn:hover { color: #c9c9d4; border-color: #4a4a5a; background: #22222e; }

    /* ── Backdrop ── */
    #global-settings-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1100;
      background: rgba(0,0,0,0.65);
      align-items: center;
      justify-content: center;
    }

    /* ── Modal card ── */
    #global-settings-modal {
      background: #16161d;
      border: 1px solid #24242e;
      border-radius: 14px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.75);
      width: min(520px, 92vw);
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .gsm-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid #1e1e28;
      flex-shrink: 0;
    }
    .gsm-header h2 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888896;
      margin: 0;
    }
    .gsm-close {
      background: none;
      border: none;
      color: #444455;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .gsm-close:hover { color: #c06070; }

    .gsm-body {
      overflow-y: auto;
      padding: 4px 0;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: #2a2a38 transparent;
    }

    .gsm-section { padding: 16px 22px; }
    .gsm-section + .gsm-section { border-top: 1px solid #1a1a24; }
    .gsm-section h3 {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3a3a4a;
      margin: 0 0 14px;
    }

    .gsm-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }
    .gsm-row label {
      font-size: 13px;
      color: #888896;
      flex: 1;
      min-width: 0;
    }
    .gsm-row input[type="range"] {
      width: 120px;
      flex-shrink: 0;
      accent-color: #7aa2f7;
      cursor: pointer;
    }
    .gsm-val {
      font-size: 12px;
      color: #c9c9d4;
      font-weight: 600;
      min-width: 44px;
      text-align: right;
      flex-shrink: 0;
    }

    .gsm-pills { display: flex; gap: 4px; }
    .gsm-pill {
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 5px;
      color: #555566;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      transition: all 0.15s;
    }
    .gsm-pill:hover { color: #888896; border-color: #3a3a4a; }
    .gsm-pill.active { background: #22223a; border-color: #7aa2f7; color: #7aa2f7; }

    .gsm-select {
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #c9c9d4;
      cursor: pointer;
      font-size: 12px;
      outline: none;
      padding: 5px 8px;
    }
    .gsm-select:focus { border-color: #7aa2f7; }

    .gsm-footer {
      border-top: 1px solid #1e1e28;
      display: flex;
      justify-content: flex-end;
      padding: 12px 22px;
      flex-shrink: 0;
    }
    .gsm-reset {
      background: none;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #444455;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 5px 14px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }
    .gsm-reset:hover { color: #c06070; border-color: #c06070; }
  </style>
</head>
<body>
<div id="board"></div>
<script src="panels.js"></script>
<script src="app.js"></script>
</body>
</html>
