<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e12;
      color: #d4d4d8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding: 28px;
      min-height: 100vh;
    }

    #board {
      columns: 290px;
      column-gap: 20px;
    }

    .panel {
      background: #16161d;
      border: 1px solid #24242e;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 11px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      transition: box-shadow 0.2s;
      break-inside: avoid;
      margin-bottom: 20px;
    }

    .panel:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.55);
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid #1e1e28;
      margin-bottom: 2px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 13px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    /* Per-panel accent colours assigned in JS */
    .panel[data-id="programming"] { --accent: #7aa2f7; }
    .panel[data-id="house"]        { --accent: #9ece6a; }
    .panel[data-id="rotation"]     { --accent: #e0af68; }
    .panel[data-id="brain"]        { --accent: #bb9af7; }
    .panel[data-id="quotes"]       { --accent: #f7768e; }

    /* ── Checklist panels ── */
    .checklist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 5px 7px;
      border-radius: 6px;
      line-height: 1.45;
      transition: background 0.15s;
    }

    .checklist li:hover {
      background: #1e1e28;
    }

    .checklist li input[type="checkbox"] {
      margin-top: 3px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
      width: 13px;
      height: 13px;
    }

    .checklist li span {
      cursor: pointer;
      flex: 1;
      color: #c9c9d4;
    }

    .checklist li.done span {
      text-decoration: line-through;
      color: #44444e;
    }

    .checklist li .del-btn {
      background: none;
      border: none;
      color: #333340;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      visibility: hidden;
      transition: color 0.15s;
    }

    .checklist li:hover .del-btn { visibility: visible; }
    .checklist li .del-btn:hover { color: #c06070; }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .add-row input[type="text"] {
      flex: 1;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #c9c9d4;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-row input[type="text"]:focus {
      border-color: var(--accent);
    }

    .add-row input[type="text"]::placeholder { color: #44444e; }

    .add-row button, .clear-btn {
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 6px;
      color: #888896;
      cursor: pointer;
      font-size: 12px;
      padding: 6px 10px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .add-row button:hover {
      background: #2a2a38;
      color: var(--accent);
      border-color: var(--accent);
    }

    .clear-btn {
      align-self: flex-start;
      font-size: 11px;
      color: #38383e;
      border-color: transparent;
      background: transparent;
    }

    .clear-btn:hover {
      background: #1e1e28;
      color: #c06070;
      border-color: transparent;
    }

    /* ── Static panels ── */
    .static-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .static-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 5px 7px;
      border-radius: 6px;
      line-height: 1.45;
      color: #b0b0bc;
      transition: background 0.15s, color 0.15s;
    }

    .static-list li:hover {
      background: #1e1e28;
      color: #d4d4d8;
    }

    .static-list li::before {
      content: '›';
      color: var(--accent);
      opacity: 0.5;
      flex-shrink: 0;
      font-size: 15px;
      line-height: 1.3;
    }

    .static-list.has-tags li {
      justify-content: space-between;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      margin-left: 8px;
      align-self: center;
    }

    .tag-daily   { background: #1a2e1a; color: #9ece6a; }
    .tag-weekly  { background: #1a2030; color: #7aa2f7; }
    .tag-anytime { background: #2a2218; color: #e0af68; }

    /* ── Drag and drop ── */
    .panel-title {
      cursor: grab;
    }

    .panel-title:active {
      cursor: grabbing;
    }

    .grip {
      color: #2e2e3e;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
      user-select: none;
    }

    .panel-title:hover .grip { color: var(--accent); opacity: 0.5; }

    .panel.dragging {
      opacity: 0;
    }

    .panel-ghost {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.85;
      transform: scale(1.03) rotate(0.5deg);
      box-shadow: 0 16px 48px rgba(0,0,0,0.7);
    }

    .drag-placeholder {
      border: 2px dashed #2e2e3e;
      border-radius: 12px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
<div id="board"></div>
<script src="panels.js"></script>
<script src="app.js"></script>
</body>
</html>
